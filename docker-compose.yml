services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reciapp
      POSTGRES_PASSWORD: reciapp
      POSTGRES_DB: reciapp
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reciapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://reciapp:reciapp@db:5432/reciapp
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
